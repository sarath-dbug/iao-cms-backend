name: Deploy IAO_CMS

on:
  push:
    branches: ["dev"]
  workflow_dispatch:  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ AWS creds (for ECR push)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # 3️⃣ Login to ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    # 4️⃣ Build & Push
    - name: Build and push Docker image
      run: |
        REGISTRY="${{ secrets.ECR_REGISTRY }}"
        REPO="${{ secrets.ECR_REPOSITORY }}"
        IMAGE="${REGISTRY}/${REPO}:latest"

        echo "Building image: $IMAGE"

        docker build -t "$IMAGE" .
        docker push "$IMAGE"

    # 5️⃣ Deploy to EC2
    - name: Deploy backend on EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.LIGHTSAIL_HOST }}
        username: ubuntu
        key: ${{ secrets.LIGHTSAIL_KEY }}
        script: |
          set -e

          REGISTRY="${{ secrets.ECR_REGISTRY }}"
          REPO="${{ secrets.ECR_REPOSITORY }}"
          IMAGE="${REGISTRY}/${REPO}:latest"

          echo "Logging into ECR..."

          aws ecr get-login-password --region ap-south-1 \
          | docker login --username AWS --password-stdin "$REGISTRY"

          echo "Pulling latest image..."
          docker pull "$IMAGE"

          echo "Stopping old container..."
          docker stop IAO_CMS_BACKEND || true
          docker rm IAO_CMS_BACKEND || true

          echo "Starting new container..."
          docker run -d \
            --name IAO_CMS_BACKEND \
            --restart always \
            -p 1337:1337 \
            --env-file /home/ubuntu/iao-cms/.env/.env.production \
            "$IMAGE"

          echo "✅ Backend deployed successfully"
